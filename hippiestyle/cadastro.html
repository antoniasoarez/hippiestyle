<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hippiestyle - Criar Conta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="style/cadastro.css">  
</head>
<body>

<header>
  <h1>Hippiestyle</h1>
  <nav>
    <a href="pages/home.html">Início</a>
    <a href="pages/produtos.html">Produtos</a>
    <a href="pages/sobre.html">Sobre</a>
    <a href="pages/contato.html">Contato</a>
  </nav>
</header>

<main>
  <section>
    <h2>Criar conta</h2>

    <form>
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" placeholder="ex.: Maria Perez">

      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="ex.: seuemail@email.com.br">

      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="ex.: suasenha">

      <label for="confirmar">Confirmar senha</label>
      <input type="password" id="confirmar" placeholder="ex.: suasenha">

      <label for="telefone">Telefone (opcional)</label>
      <input type="tel" id="telefone" placeholder="ex.: 11971923030">

      <button type="button" onclick="criarConta()">Criar conta</button>

      <p>Já possui uma conta? <a href="pages/login.html">Faça login</a></p>
    </form>
  </section>
</main>

<footer>
  <p>Hippiestyle - todos os direitos reservados</p>
</footer>

<script src="script/cadastro.js"></script>

</body>
</html>
