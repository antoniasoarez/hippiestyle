<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hippiestyle | login</title>

    <link rel="stylesheet" href="../style/login.css">
    <script src="../script/login.js"></script>
</head>

<body>
    <!----Página de login do site, onde o usuário pode acessar sua conta existente.---->
    <img class="logo" src="../src/images/logo.png" alt="logomarca do site hippiestyle">

    <h1>hippiestyle</h1>
    <h2>login</h2>

    <main>
        <section class="cadastro">
            <form>

                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seuemail@email.com.br">


                <label for="senha">Senha</label>
                <div class="campo-senha">
                    <input type="password" id="senha" placeholder="suasenha">
                </div>

            

                <button class="botao" type="button" onclick="fazerLogin()">
                                        entrar
                                    </button>
            </form>
            
            
        </section>
    </main>


</body>

</html>
