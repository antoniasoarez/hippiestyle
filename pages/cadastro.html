<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Hippiestyle | Criar Conta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="../style/cadastro.css">
</head>

<body>

  <header>
        <h1>Hippiestyle</h1>
        <nav>
            <a onclick="Redirecionamento()">Início</a>
            <a onclick="Redirecionamento()">Produtos</a>
        </nav>
        <p id="msgRedirecionamento"></p>
    </header>

  <main>
    <section>
      <h2>Criar Conta</h2>

      <form>
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" placeholder="Maria Perez">

        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seuemail@email.com">

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="suaSenh@123!">

        <label for="confirmar">Confirmar senha</label>
        <input type="password" id="confirmar" placeholder="suaSenh@123!">

        <label for="telefone">Telefone (opcional)</label>
        <input type="tel" id="telefone" placeholder="(00) 00000-0000">

        <button type="button" onclick="criarConta()">Criar conta</button>

        <p>Já possui uma conta? <a href="../index.html">Faça login</a></p>
      </form>
    </section>
  </main>

  <footer>
    <p>Hippiestyle© - Todos os direitos reservados</p>
  </footer>

  <script src="../script/cadastro.js"></script>

</body>

</html>
